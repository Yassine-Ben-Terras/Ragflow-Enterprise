version: "3.9"

services:

  # ── Qdrant ──────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragflow_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragflow_postgres
    environment:
      POSTGRES_USER: ragflow
      POSTGRES_PASSWORD: ragflow
      POSTGRES_DB: ragflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  qdrant_data:
  pgdata:
